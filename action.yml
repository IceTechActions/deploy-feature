name: Deploy Feature Environment
description: >
  Deploy Container Apps, HttpRouteConfig, and Front Door resources for a feature
  environment using main.bicep. Requires an active Azure CLI session.

inputs:
  feature_name:
    description: Feature environment name (e.g. feature-1234)
    required: true
  resource_group:
    description: Azure resource group for the deployment
    required: true
  registry_server:
    description: Container registry server URL (e.g. niscontainers.azurecr.io)
    required: true
  nordic_image_tag:
    description: Nordic container image tag
    required: true
  worker_image_tag:
    description: Worker container image tag
    required: true
  waf_policy_id:
    description: Resource ID of the WAF policy to associate
    required: true
  dns_zone_resource_group:
    description: Resource group containing the cust.nisportal.com DNS zone
    required: true
  user_managed_identity_name:
    description: Name of the user-assigned managed identity used for ACR pull access on the Container Apps
    required: true
  user_managed_identity_resource_group:
    description: Resource group where the user-assigned managed identity resides
    required: true
  app_config_name:
    description: Name of the Azure App Configuration resource
    required: true
  use_elastic8:
    description: Whether to enable Elastic 8 (true/false)
    required: false
    default: 'true'
  elastic8_endpoint:
    description: Elastic 8 endpoint URL (leave empty to disable)
    required: false
    default: ''
  dns_zone_name:
    description: DNS zone name used to construct the custom domain resource name
    required: false
    default: 'cust.nisportal.com'
  keyvault_name:
    description: Key Vault name where feature secrets are stored
    required: true
  sql_server:
    description: SQL server hostname for the feature database connection string
    required: true
  sql_user_name:
    description: Feature SQL login name
    required: true
  sql_user_password:
    description: SQL login password (sensitive — pass via secrets context)
    required: true
  jwt_secret:
    description: JWT secret value (sensitive — pass via secrets context). Leave empty if no custom secret is available.
    required: false
    default: ''
  is_pr_check:
    description: Skip secret-setting when 'true' (PR check redeployment)
    required: false
    default: 'false'
  container_apps_environment_name:
    description: Name of the shared Container Apps Environment
    required: false
    default: 'feature-environments'
  front_door_name:
    description: Name of the shared Azure Front Door profile
    required: false
    default: 'fd-nisportal'

outputs:
  feature_url:
    description: Full HTTPS URL of the deployed feature environment
    value: ${{ steps.deploy.outputs.feature_url }}
  fd_hostname:
    description: Front Door endpoint hostname (without https://) — pass to create-dns-cname
    value: ${{ steps.deploy.outputs.fd_hostname }}

runs:
  using: composite
  steps:
    - name: Set Key Vault and App Config secrets
      if: inputs.is_pr_check != 'true'
      shell: bash
      env:
        KEYVAULT_NAME: ${{ inputs.keyvault_name }}
        SQL_SERVER: ${{ inputs.sql_server }}
        SQL_USER_NAME: ${{ inputs.sql_user_name }}
        SQL_USER_PASSWORD: ${{ inputs.sql_user_password }}
        JWT_SECRET: ${{ inputs.jwt_secret }}
        APP_CONFIG_NAME: ${{ inputs.app_config_name }}
      run: |
        PR_ID=$(echo "${{ inputs.feature_name }}" | sed 's/^feature-//')
        bash "${{ github.action_path }}/scripts/set-secrets.sh" \
          "$KEYVAULT_NAME" \
          "$PR_ID" \
          "$SQL_SERVER" \
          "$SQL_USER_NAME" \
          "$SQL_USER_PASSWORD" \
          "$JWT_SECRET" \
          "$APP_CONFIG_NAME"

    - name: Ensure Container Apps Environment is running
      shell: bash
      run: |
        ENV_NAME="${{ inputs.container_apps_environment_name }}"
        RG="${{ inputs.resource_group }}"

        echo "Starting Container Apps Environment (no-op if already running)..."
        az containerapp env start \
          --name "$ENV_NAME" \
          --resource-group "$RG" 2>/dev/null || true
        echo "Container Apps Environment is ready."

    - name: Deploy to Azure
      id: deploy
      shell: bash
      run: |
        RESULT=$(az deployment group create \
          --name "deploy-${{ inputs.feature_name }}-$(date +%Y%m%d-%H%M%S)" \
          --resource-group "${{ inputs.resource_group }}" \
          --template-file "${{ github.action_path }}/main.bicep" \
          --parameters "${{ github.action_path }}/parameters/feature-environment.bicepparam" \
          --parameters \
            name="${{ inputs.feature_name }}" \
            registryServer="${{ inputs.registry_server }}" \
            nordicContainerImageName="${{ inputs.registry_server }}/nordic" \
            nordicContainerImageTag="${{ inputs.nordic_image_tag }}" \
            workerContainerImageName="${{ inputs.registry_server }}/worker" \
            workerContainerImageTag="${{ inputs.worker_image_tag }}" \
            appConfigLabel="Feature-$(echo '${{ inputs.feature_name }}' | sed 's/^feature-//')" \
            userManagedIdentityName="${{ inputs.user_managed_identity_name }}" \
            userManagedIdentityResourceGroup="${{ inputs.user_managed_identity_resource_group }}" \
            appConfigName="${{ inputs.app_config_name }}" \
            useElastic8="${{ inputs.use_elastic8 }}" \
            elastic8Endpoint="${{ inputs.elastic8_endpoint }}" \
            hasCustomJwtSecret="${{ inputs.jwt_secret != '' }}" \
            containerAppsEnvironmentName="${{ inputs.container_apps_environment_name }}" \
            dnsZoneResourceGroup="${{ inputs.dns_zone_resource_group }}" \
            dnsZoneName="${{ inputs.dns_zone_name }}" \
            frontDoorName="${{ inputs.front_door_name }}" \
          --query 'properties.outputs' -o json)

        FD_URL=$(echo "$RESULT" | jq -r '.frontDoorUrl.value' | sed 's|https://||')
        echo "fd_hostname=$FD_URL" >> "$GITHUB_OUTPUT"
        echo "feature_url=$(echo "$RESULT" | jq -r '.featureUrl.value')" >> "$GITHUB_OUTPUT"

        # Compute and export the custom domain resource ID for the WAF step
        SUB_ID=$(az account show --query id -o tsv)
        DNS_ZONE="${{ inputs.dns_zone_name }}"
        DOMAIN_NAME=$(echo "${{ inputs.feature_name }}-${DNS_ZONE}" | tr '.' '-')
        DOMAIN_ID="/subscriptions/${SUB_ID}/resourceGroups/${{ inputs.resource_group }}/providers/Microsoft.Cdn/profiles/${{ inputs.front_door_name }}/customDomains/${DOMAIN_NAME}"
        echo "custom_domain_id=${DOMAIN_ID}" >> "$GITHUB_OUTPUT"

    - name: Associate custom domain with WAF security policy
      uses: IceTechActions/front-door-waf-domain@f27332454bb910e4287fe594cc8ba08763a4259e # v1.0.0
      with:
        profile_name: ${{ inputs.front_door_name }}
        resource_group: ${{ inputs.resource_group }}
        waf_policy_id: ${{ inputs.waf_policy_id }}
        domain_id: ${{ steps.deploy.outputs.custom_domain_id }}
        mode: associate

